name: Build & Push Docker Image

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------- LOGIN --------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------- BUILD (LOCAL IMAGE) --------
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/k8s-app:${{ github.sha }} ./k8s-app

      # -------- TRIVY SCAN --------
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/k8s-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0

      # -------- PUSH --------
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-app:${{ github.sha }}

      # -------- UPLOAD SARIF --------
      - name: Upload Trivy results
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif