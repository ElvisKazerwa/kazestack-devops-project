name: Build & Push Docker Image

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/k8s-app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      # -------- BUILD (no push yet) --------
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./k8s-app
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/k8s-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------- TRIVY SCAN (LATEST - MASTER) --------
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/k8s-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0

      # -------- PUSH ONLY AFTER SCAN --------
      - name: Push Docker image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./k8s-app
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ secrets.DOCKER_USERNAME }}/k8s-app:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------- UPLOAD SARIF --------
      - name: Upload Trivy results
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif