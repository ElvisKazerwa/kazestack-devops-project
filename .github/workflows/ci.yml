name: CI - Lint & Test

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pylint pytest pytest-cov
      
      - name: Check formatting with Black
        run: black --check kazestack-devops-project/
      
      - name: Lint with Flake8
        run: flake8 kazestack-devops-project/ --max-line-length=100
      
      - name: Lint with Pylint
        run: pylint kazestack-devops-project/
      
      - name: Run unit tests
        run: pytest tests/ -v --cov=kazestack-devops-project --cov-report=xml || true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  terraform-validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
      
      - name: Terraform Format Check
        run: |
          cd kazestack-devops-project/terraform-azure
          terraform fmt -check -recursive
      
      - name: Terraform Init
        run: |
          cd kazestack-devops-project/terraform-azure
          terraform init -backend=false
      
      - name: Terraform Validate
        run: |
          cd kazestack-devops-project/terraform-azure
          terraform validate

  docker-lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009
