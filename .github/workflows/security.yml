name: Security Scan

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: k8s-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------- FILESYSTEM SCAN --------
      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif

      # -------- REPO SCAN --------
      - name: Run Trivy Repo scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: repo
          scan-ref: .
          format: sarif
          output: trivy-repo.sarif

      # -------- UPLOAD FS SARIF --------
      - name: Upload FS results
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # -------- UPLOAD REPO SARIF --------
      - name: Upload Repo results
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-repo.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-repo.sarif
          category: trivy-repo

  dependency-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: k8s-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run dependency audit
        run: |
          pip install pip-audit
          pip-audit || true

  container-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t k8s-app:scan ./k8s-app

      # -------- IMAGE SCAN --------
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: k8s-app:scan
          format: sarif
          output: trivy-image.sarif
          exit-code: 0

      - name: Upload image scan results
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image