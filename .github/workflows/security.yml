name: Security Scan

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: k8s-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------- FILESYSTEM SCAN --------
      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif

      # -------- REPO SCAN --------
      - name: Run Trivy Repo scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: repo
          scan-ref: .
          format: sarif
          output: trivy-repo.sarif

      # -------- UPLOAD SARIF (skip PRs from forks) --------
      - name: Upload FS results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: k8s-app/trivy-fs.sarif

      - name: Upload Repo results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: k8s-app/trivy-repo.sarif

  dependency-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: k8s-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check outdated packages
        run: pip list --outdated || true

      - name: Security check (Safety)
        run: |
          pip install safety
          safety check --full-report || true

  container-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t k8s-app:scan ./k8s-app

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: k8s-app:scan
          format: table
          exit-code: 0

  code-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: k8s-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint pylint-json2html

      - name: Run pylint
        run: |
          pylint . --exit-zero --output-format=json > pylint-report.json || true

      - name: Convert report to HTML
        run: |
          pylint-json2html -f jsonOnly -o pylint-report.html pylint-report.json || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report
          path: k8s-app/pylint-report.html